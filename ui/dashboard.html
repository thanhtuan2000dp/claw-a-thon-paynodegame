<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veridex Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0a0e16; --panel:#161b27; --border:#1e2d45;
      --accent:#22c55e; --cyan:#22d3ee; --violet:#a855f7;
      --muted:#64748b; --text:#e2e8f0;
      --grad:linear-gradient(135deg,#22c55e,#22d3ee,#a855f7);
      --glass-bg:rgba(255,255,255,.05); --glass-bd:rgba(148,163,184,.18);
      --up:#22c55e; --down:#f87171; --warn:#fbbf24;
    }
    body.light {
      --bg:#eef2f7; --panel:#ffffff; --border:#dfe5ee; --muted:#64748b; --text:#0f172a;
      --glass-bg:rgba(255,255,255,.78); --glass-bd:rgba(15,23,42,.10);
    }
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; position: relative; overflow-x: hidden; }
    .aurora { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
    .aurora span { position: absolute; border-radius: 50%; filter: blur(60px); opacity: .32; will-change: transform; }
    .aurora .a1 { width: 520px; height: 520px; top: -120px; left: -80px;  background: #22c55e; animation: drift1 16s ease-in-out infinite; }
    .aurora .a2 { width: 460px; height: 460px; top: 30%;    right: -120px; background: #22d3ee; animation: drift2 18s ease-in-out infinite; }
    .aurora .a3 { width: 420px; height: 420px; bottom: -140px; left: 35%;  background: #a855f7; animation: drift3 14s ease-in-out infinite; }
    body.light .aurora span { opacity: .14; }
    @keyframes drift1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(60px,40px) scale(1.15); } }
    @keyframes drift2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-50px,30px) scale(1.1); } }
    @keyframes drift3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(40px,-50px) scale(1.2); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    header { position: sticky; top: 0; z-index: 10; padding: 12px 24px; border-bottom: 1px solid var(--border);
             display: flex; align-items: center; gap: 12px; background: rgba(10,14,22,.55); backdrop-filter: blur(8px); }
    body.light header { background: rgba(255,255,255,.7); }
    header .orb { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
                  background: conic-gradient(from 0deg, #22c55e, #22d3ee, #a855f7, #22c55e);
                  box-shadow: 0 0 14px rgba(34,211,238,.5); display: flex; align-items: center; justify-content: center;
                  font-size: 13px; color: #04130a; animation: spin 8s linear infinite; }
    header .wordmark { font-size: 18px; font-weight: 800; background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
    header .dsub { font-size: 12px; color: var(--muted); border-left: 1px solid var(--border); padding-left: 12px; }
    header .meta { font-size: 12px; color: var(--muted); margin-left: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    header .spacer { margin-left: auto; }
    .pillgroup { display: flex; gap: 6px; }
    .pill { background-image: linear-gradient(var(--panel),var(--panel)), var(--grad); background-origin: border-box; background-clip: padding-box, border-box;
            border: 1px solid transparent; color: var(--text); font-size: 12px; padding: 6px 12px; border-radius: 999px; cursor: pointer;
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: filter .15s ease; }
    .pill:hover { filter: brightness(1.25); }
    .pill.active { filter: brightness(1.4); box-shadow: inset 0 0 0 1px var(--accent); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; padding: 22px 24px; max-width: 1200px; margin: 0 auto; }
    .card { background: var(--glass-bg); border: 1px solid var(--glass-bd); backdrop-filter: blur(6px); border-radius: 14px; padding: 16px; transition: transform .15s ease, border-color .15s ease; }
    .card:hover { transform: translateY(-3px); border-color: var(--accent); }
    .card.wide { grid-column: 1 / -1; }
    .card.reveal { animation: revealUp .34s ease both; }
    @keyframes revealUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .card .title { font-size: 13px; color: #93c5fd; font-weight: 600; margin-bottom: 10px; }
    body.light .card .title { color: #2563eb; }
    .storehead { font-size: 14px; font-weight: 700; padding: 6px 2px; color: var(--text); }
    .kpi .label { font-size: 12px; color: var(--muted); }
    .kpi .value { font-size: 30px; font-weight: 800; margin-top: 4px; line-height: 1.1; word-break: break-word; }
    .kpi .delta { font-size: 13px; font-weight: 700; margin-top: 6px; }
    .kpi .delta.up { color: var(--up); } .kpi .delta.down { color: var(--down); } .kpi .delta.flat { color: var(--warn); }
    canvas { max-height: 260px; }
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    th, td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    th { background: rgba(10,14,22,.5); cursor: pointer; user-select: none; white-space: nowrap; }
    body.light th { background: rgba(15,23,42,.05); }
    .tfilter { width: 100%; margin-bottom: 8px; background: var(--panel); border: 1px solid var(--border); color: var(--text);
               border-radius: 8px; padding: 7px 10px; font-size: 13px; font-family: inherit; }
    .tfilter:focus { outline: none; border-color: var(--accent); }
    .listw { list-style: none; }
    .listw li { padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .listw li:last-child { border-bottom: none; }
    .textw { font-size: 13px; line-height: 1.55; }
    .textw img { height: 120px; border-radius: 8px; margin: 4px; }
    .chartswitch { float: right; font-size: 11px; }
    .empty { max-width: 520px; margin: 80px auto; text-align: center; }
    @media (prefers-reduced-motion: reduce) {
      .aurora span, header .orb { animation: none; }
      .card.reveal { animation: none; }
    }
  </style>
</head>
<body>
  <div class="aurora" aria-hidden="true"><span class="a1"></span><span class="a2"></span><span class="a3"></span></div>
  <header>
    <span class="orb" aria-hidden="true">✦</span>
    <span class="wordmark">Veridex</span>
    <span class="dsub">Dashboard</span>
    <div id="storeToggle" class="pillgroup" role="group" aria-label="Chọn store"></div>
    <span class="meta" id="meta"></span>
    <span class="spacer"></span>
    <button class="pill" id="themeBtn" onclick="toggleTheme()" aria-label="Đổi giao diện sáng/tối">🌙</button>
    <a class="pill" href="/" aria-label="Quay lại chat">← Chat</a>
  </header>

  <div id="grid" class="grid"></div>

  <script>
    marked.setOptions({ gfm: true, breaks: true });
    const UC_NAMES = {
      uc1_store_metadata: 'Metadata cửa hàng', uc2_reviews_sentiment: 'Review & sentiment',
      uc3_version_changelog: 'Lịch sử phiên bản', uc4_kpi_dashboard: 'Bảng KPI',
      uc6_version_impact: 'Tác động bản cập nhật', uc7_competitive_comparison: 'So sánh đối thủ',
      uc8_competitor_weakness: 'Điểm yếu đối thủ', uc9_trend_alert: 'Cảnh báo biến động',
      uc10_insight_qa: 'Hỏi đáp tổng hợp',
    };
    const PIE_COLORS = ['rgba(34,197,94,.6)','rgba(34,211,238,.6)','rgba(168,85,247,.6)','rgba(251,191,36,.6)','rgba(248,113,113,.6)','rgba(148,163,184,.6)'];
    const DEMO = {
      uc2: { query: 'review gần đây của Zalo nói gì?', result: {
        use_case: 'uc2_reviews_sentiment', lang: 'vi', app: { name: 'Zalo', store: 'ios' },
        window: { from: '2026-05-17', to: '2026-06-16' }, totals: { reviews: 420 }, avg_rating: 3.8,
        sentiment: { positive: { pct: 58 }, neutral: { pct: 12 }, negative: { pct: 30 } },
        star_distribution: { '5': { count: 210, pct: 50 }, '4': { count: 60, pct: 14 }, '3': { count: 30, pct: 7 }, '2': { count: 40, pct: 10 }, '1': { count: 80, pct: 19 } },
        language_distribution: { vi: { pct: 82 }, en: { pct: 18 } },
        weekly_trend: [{ week: '2026-W19', volume: 90, avg_rating: 4.0, negative_pct: 22 }, { week: '2026-W20', volume: 110, avg_rating: 3.9, negative_pct: 27 }, { week: '2026-W21', volume: 130, avg_rating: 3.6, negative_pct: 34 }, { week: '2026-W22', volume: 90, avg_rating: 3.7, negative_pct: 31 }],
        themes: { praise: [{ theme: 'Chuyển tiền nhanh', count: 42 }, { theme: 'Giao diện gọn', count: 18 }], complaints: [{ theme: 'Quảng cáo', count: 55 }, { theme: 'Lỗi đăng nhập', count: 33 }] },
        summary: 'Rating giảm nhẹ tuần gần đây, chủ yếu do phàn nàn quảng cáo và lỗi đăng nhập.',
      } },
      uc4_cross: { query: 'KPI của Spotify', result: {
        use_case: 'uc4_kpi_dashboard', lang: 'vi', mode: 'cross_platform', app_query: 'Spotify',
        platforms: {
          ios: { app: { name: 'Spotify', store: 'ios' }, kpis: { rating: 4.7, rank: 3, rank_chart: 'top-free', ratings_count: 2500000, version: '9.0.1' },
            deltas: { since: '2026-06-09', rating: 0.02, rank: -1, ratings_count: 12000 },
            trend: [{ date: '2026-06-09', rating: 4.68, rank: 4, ratings_count: 2488000, version: '9.0.0' }, { date: '2026-06-16', rating: 4.70, rank: 3, ratings_count: 2500000, version: '9.0.1' }] },
          android: { app: { name: 'Spotify', store: 'android' }, kpis: { rating: 4.3, rank: null, rank_chart: null, ratings_count: 31000000, version: '9.0.1' },
            deltas: { since: '2026-06-09', rating: -0.01, rank: null, ratings_count: 45000 },
            trend: [{ date: '2026-06-09', rating: 4.31, rank: null, ratings_count: 30955000, version: '9.0.0' }, { date: '2026-06-16', rating: 4.30, rank: null, ratings_count: 31000000, version: '9.0.1' }] },
        },
      } },
    };
    const REDUCE = () => window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const el = (tag, cls, html) => { const e = document.createElement(tag); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e; };
    const esc = s => String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    const fmt = (v, d = 2) => v == null ? 'n/a' : (typeof v === 'number' && !Number.isInteger(v) ? v.toFixed(d) : String(v));
    const signed = (v, d = 2) => v == null ? 'n/a' : (v >= 0 ? '+' : '') + (typeof v === 'number' ? v.toFixed(d) : v);
    const num = v => (typeof v === 'number') ? v.toLocaleString() : 'n/a';

    // ---- theme ----
    function applyTheme(t) {
      document.body.classList.toggle('light', t === 'light');
      document.getElementById('themeBtn').textContent = t === 'light' ? '☀️' : '🌙';
    }
    function toggleTheme() {
      const next = document.body.classList.contains('light') ? 'dark' : 'light';
      localStorage.setItem('veridex_dash_theme', next);
      applyTheme(next);
    }

    function showEmpty() {
      document.getElementById('grid').innerHTML =
        '<div class="card empty"><div class="title">Không có dữ liệu</div>' +
        '<p class="textw">Mở dashboard từ khung chat: hỏi một app rồi bấm <b>📊 Mở dashboard</b>.</p>' +
        '<p class="textw" style="margin-top:12px"><a class="pill" href="/">← Về chat</a></p></div>';
    }

    // ---- delta helpers (rank: lower is better, so negative rank delta = up) ----
    function deltaOf(v, d = 2) { if (v == null) return {}; return { delta: signed(v, d), deltaDir: v > 0 ? 'up' : v < 0 ? 'down' : 'flat' }; }
    function rankDelta(v) { if (v == null) return {}; return { delta: (v > 0 ? '+' : '') + v, deltaDir: v < 0 ? 'up' : v > 0 ? 'down' : 'flat' }; }
    function countDelta(v) { if (typeof v !== 'number') return {}; return { delta: (v > 0 ? '+' : '') + v.toLocaleString(), deltaDir: v > 0 ? 'up' : v < 0 ? 'down' : 'flat' }; }

    // ---- card renderers ----
    function kpiCard(w) {
      const c = el('div', 'card kpi');
      c.appendChild(el('div', 'label', esc(w.label)));
      c.appendChild(el('div', 'value', w.value == null ? 'n/a' : esc(String(w.value))));
      if (w.delta != null) c.appendChild(el('div', 'delta ' + (w.deltaDir || 'flat'),
        (w.deltaDir === 'up' ? '▲ ' : w.deltaDir === 'down' ? '▼ ' : '• ') + esc(String(w.delta))));
      return c;
    }
    function chartCard(w) {
      const c = el('div', 'card wide'); const ttl = el('div', 'title', esc(w.title));
      if (w.type === 'bar' || w.type === 'line') {
        const sw = el('button', 'pill chartswitch', w.type === 'bar' ? '⤳ line' : '⤳ bar');
        sw.onclick = () => { w.type = w.type === 'bar' ? 'line' : 'bar'; const fresh = chartCard(w); fresh.classList.add('reveal'); c.replaceWith(fresh); };
        ttl.appendChild(sw);
      }
      c.appendChild(ttl);
      const cv = document.createElement('canvas'); c.appendChild(cv);
      const isPie = w.type === 'doughnut' || w.type === 'pie';
      c._chart = new Chart(cv, {
        type: w.type,
        data: { labels: w.labels, datasets: [{ label: w.title, data: w.data,
          backgroundColor: isPie ? PIE_COLORS : 'rgba(34,197,94,.45)', borderColor: '#22c55e', borderWidth: 2,
          tension: .3, fill: w.type !== 'line' }] },
        options: { animation: REDUCE() ? false : { duration: 700, easing: 'easeOutQuart' },
          plugins: { legend: { display: isPie } },
          scales: isPie ? {} : { x: { ticks: { color: '#94a3b8', font: { size: 10 } } }, y: { ticks: { color: '#94a3b8' }, beginAtZero: true } } },
      });
      c._spec = w;
      return c;
    }
    function tableCard(w) {
      const c = el('div', 'card wide'); c.appendChild(el('div', 'title', esc(w.title || 'Bảng')));
      const headers = w.headers || [], rows = (w.rows || []).map(r => r.slice());
      let sortCol = -1, sortAsc = true, filter = '';
      const fbox = el('input', 'tfilter'); fbox.type = 'text'; fbox.placeholder = 'Lọc…';
      fbox.setAttribute('aria-label', 'Lọc bảng');
      const tbl = el('table'), thead = el('thead'), tbody = el('tbody');
      const htr = el('tr');
      headers.forEach((h, ci) => { const th = el('th', null, esc(h)); th.onclick = () => { sortAsc = sortCol === ci ? !sortAsc : true; sortCol = ci; paint(); }; htr.appendChild(th); });
      thead.appendChild(htr); tbl.appendChild(thead); tbl.appendChild(tbody);
      fbox.oninput = () => { filter = fbox.value.toLowerCase(); paint(); };
      function paint() {
        let view = rows.filter(r => !filter || r.some(cell => String(cell == null ? '' : cell).toLowerCase().includes(filter)));
        if (sortCol >= 0) {
          view = view.slice().sort((a, b) => {
            const x = a[sortCol], y = b[sortCol], nx = parseFloat(String(x).replace(/[,#%]/g, '')), ny = parseFloat(String(y).replace(/[,#%]/g, ''));
            const cmp = (!isNaN(nx) && !isNaN(ny)) ? nx - ny : String(x).localeCompare(String(y));
            return sortAsc ? cmp : -cmp;
          });
        }
        tbody.innerHTML = '';
        view.forEach(r => { const tr = el('tr'); r.forEach(cell => tr.appendChild(el('td', null, esc(cell == null ? '' : cell)))); tbody.appendChild(tr); });
      }
      if (rows.length > 5) c.appendChild(fbox);
      c.appendChild(tbl); paint();
      return c;
    }
    function listCard(w) {
      const c = el('div', 'card'); c.appendChild(el('div', 'title', esc(w.title)));
      const ul = el('ul', 'listw'); (w.items || []).forEach(it => ul.appendChild(el('li', null, esc(it)))); c.appendChild(ul);
      return c;
    }
    function textCard(w) {
      const c = el('div', 'card wide'); if (w.title) c.appendChild(el('div', 'title', esc(w.title)));
      c.appendChild(el('div', 'textw', w.html || ''));
      return c;
    }
    function cardFor(w) {
      if (w.kind === 'kpi') return kpiCard(w);
      if (w.kind === 'chart') return chartCard(w);
      if (w.kind === 'table') return tableCard(w);
      if (w.kind === 'list') return listCard(w);
      if (w.kind === 'text') return textCard(w);
      return null;
    }

    // ---- block selection + generic fallback ----
    function pickBlocks(result) {
      if (result.platforms) return Object.entries(result.platforms).filter(([k, v]) => v && !v.error).map(([k, v]) => ({ store: k, data: v }));
      return [{ store: '', data: result }];
    }
    function buildUc2(b) {
      const t = b.totals || {}, s = b.sentiment || {}, star = b.star_distribution || {}, ld = b.language_distribution || {}, wt = b.weekly_trend || [], th = b.themes || {};
      const w = [
        { kind: 'kpi', label: 'Tổng review', value: t.reviews != null ? num(t.reviews) : 'n/a' },
        { kind: 'kpi', label: 'Rating TB', value: fmt(b.avg_rating) },
        { kind: 'kpi', label: '% Tích cực', value: ((s.positive || {}).pct ?? 0) + '%', delta: 'tích cực', deltaDir: 'up' },
        { kind: 'kpi', label: '% Tiêu cực', value: ((s.negative || {}).pct ?? 0) + '%', delta: 'tiêu cực', deltaDir: 'down' },
      ];
      w.push({ kind: 'chart', title: 'Phân bố sao', type: 'bar', labels: ['5★','4★','3★','2★','1★'], data: ['5','4','3','2','1'].map(k => (star[k] || {}).count || 0) });
      if (wt.length > 1) w.push({ kind: 'chart', title: 'Rating theo tuần', type: 'line', labels: wt.map(x => x.week), data: wt.map(x => x.avg_rating) });
      const lk = Object.keys(ld); if (lk.length) w.push({ kind: 'chart', title: 'Ngôn ngữ', type: 'doughnut', labels: lk, data: lk.map(k => ld[k].pct) });
      if ((th.praise || []).length) w.push({ kind: 'list', title: '👍 Khen', items: th.praise.map(x => x.theme + ' (' + x.count + ')') });
      if ((th.complaints || []).length) w.push({ kind: 'list', title: '👎 Phàn nàn / bug', items: th.complaints.map(x => x.theme + ' (' + x.count + ')') });
      w.push({ kind: 'table', title: 'Phân bố sao', headers: ['★','#','%'], rows: ['5','4','3','2','1'].map(k => [k + '★', (star[k] || {}).count ?? 0, ((star[k] || {}).pct ?? 0) + '%']) });
      if (b.summary) w.push({ kind: 'text', title: 'Tóm tắt', html: marked.parse(b.summary) });
      return w;
    }
    function buildUc4(b) {
      const k = b.kpis || {}, d = b.deltas || {}, tr = b.trend || [];
      const w = [
        { kind: 'kpi', label: 'Rating', value: fmt(k.rating), ...deltaOf(d.rating, 3) },
        { kind: 'kpi', label: 'Rank', value: k.rank != null ? (k.rank_chart ? k.rank_chart + ' #' : '#') + k.rank : 'n/a', ...rankDelta(d.rank) },
        { kind: 'kpi', label: 'Lượt rating', value: num(k.ratings_count), ...countDelta(d.ratings_count) },
        { kind: 'kpi', label: 'Version', value: k.version || '?' },
      ];
      if (tr.length > 1) {
        w.push({ kind: 'chart', title: 'Rating theo thời gian', type: 'line', labels: tr.map(x => x.date), data: tr.map(x => x.rating) });
        if (tr.some(x => x.rank != null)) w.push({ kind: 'chart', title: 'Rank theo thời gian', type: 'line', labels: tr.map(x => x.date), data: tr.map(x => x.rank) });
        w.push({ kind: 'table', title: 'Lịch sử', headers: ['Ngày','Rating','Rank','Lượt rating','Version'],
          rows: tr.map(x => [x.date, fmt(x.rating), x.rank ?? 'n/a', num(x.ratings_count), x.version || '']) });
      }
      return w;
    }
    function buildUc7(b) {
      const comp = b.comparison || [], you = comp.find(c => c.is_you) || {};
      const w = [
        { kind: 'kpi', label: 'Rank của bạn', value: you.rank != null ? '#' + you.rank : 'n/a' },
        { kind: 'kpi', label: 'Rating của bạn', value: fmt(you.rating) },
        { kind: 'kpi', label: 'Số app so sánh', value: comp.length },
      ];
      if (comp.length) {
        w.push({ kind: 'chart', title: 'Rating đối thủ', type: 'bar', labels: comp.map(c => c.name), data: comp.map(c => c.rating) });
        if (comp.some(c => c.rank != null)) w.push({ kind: 'chart', title: 'Rank đối thủ', type: 'bar', labels: comp.map(c => c.name), data: comp.map(c => c.rank) });
        w.push({ kind: 'table', title: 'So sánh', headers: ['App','Rank','Rating','Lượt rating','Giá','Version'],
          rows: comp.map(c => [(c.is_you ? '⭐ ' : '') + c.name, c.rank ?? 'n/a', fmt(c.rating), num(c.ratings_count), c.price || 'n/a', c.version || 'n/a']) });
      }
      if ((b.positioning || []).length) w.push({ kind: 'list', title: '📊 Định vị', items: b.positioning });
      return w;
    }
    const DASHBOARDS = {
      uc2_reviews_sentiment: buildUc2,
      uc4_kpi_dashboard: buildUc4,
      uc7_competitive_comparison: buildUc7,
    };
    function buildGeneric(block) {
      const w = [];
      Object.entries(block).forEach(([k, v]) => { if (typeof v === 'number') w.push({ kind: 'kpi', label: k, value: fmt(v) }); });
      Object.entries(block).forEach(([k, v]) => {
        if (Array.isArray(v) && v.length && typeof v[0] === 'object') {
          const headers = Object.keys(v[0]);
          w.push({ kind: 'table', title: k, headers, rows: v.map(o => headers.map(h => typeof o[h] === 'object' ? JSON.stringify(o[h]) : o[h])) });
        }
      });
      if (block.summary) w.push({ kind: 'text', title: 'Tóm tắt', html: marked.parse(block.summary) });
      if (!w.length) w.push({ kind: 'text', title: 'Dữ liệu', html: '<pre>' + esc(JSON.stringify(block, null, 2)) + '</pre>' });
      return w;
    }
    function widgetsFor(uc, block) {
      try { return DASHBOARDS[uc] ? DASHBOARDS[uc](block) : buildGeneric(block); }
      catch (e) { console.warn('builder failed', uc, e); return buildGeneric(block); }
    }

    // ---- render engine ----
    let CURRENT = { result: null, blocks: [], store: 'all', uc: '' };
    function setHeaderMeta(result, query) {
      const app = result.app_query || (result.app && result.app.name) ||
        (result.platforms && (Object.values(result.platforms).find(p => p && p.app) || {}).app || {}).name || '';
      document.getElementById('meta').textContent = [app, UC_NAMES[result.use_case] || result.use_case, query].filter(Boolean).join(' · ');
      document.title = (app ? app + ' — ' : '') + 'Veridex Dashboard';
    }
    function setStore(s) { CURRENT.store = s; buildStoreToggle(); drawGrid(); }
    function buildStoreToggle() {
      const host = document.getElementById('storeToggle'); host.innerHTML = '';
      if (CURRENT.blocks.length < 2) return;
      const opts = [['all', 'Cả hai'], ...CURRENT.blocks.map(b => [b.store, b.store === 'ios' ? '🍎 iOS' : '🤖 Android'])];
      opts.forEach(([val, label]) => {
        const btn = el('button', 'pill' + (CURRENT.store === val ? ' active' : ''), label);
        btn.onclick = () => setStore(val);
        host.appendChild(btn);
      });
    }
    function drawGrid() {
      const host = document.getElementById('grid'); host.innerHTML = '';
      const blocks = CURRENT.store === 'all' ? CURRENT.blocks : CURRENT.blocks.filter(b => b.store === CURRENT.store);
      let idx = 0;
      blocks.forEach(b => {
        if (CURRENT.blocks.length > 1 && b.store) host.appendChild(el('div', 'card wide storehead', b.store === 'ios' ? '🍎 iOS' : '🤖 Android'));
        widgetsFor(CURRENT.uc, b.data).forEach(w => {
          const card = cardFor(w); if (!card) return;
          if (!REDUCE()) { card.classList.add('reveal'); card.style.animationDelay = (idx * 60) + 'ms'; }
          host.appendChild(card); idx++;
        });
      });
    }
    function renderDashboard(result, query) {
      CURRENT = { result, blocks: pickBlocks(result), store: 'all', uc: result.use_case };
      setHeaderMeta(result, query);
      buildStoreToggle();
      drawGrid();
    }

    function init() {
      applyTheme(localStorage.getItem('veridex_dash_theme') || 'dark');
      const params = new URLSearchParams(location.search);
      const demo = params.get('demo');
      if (demo && DEMO[demo]) { renderDashboard(DEMO[demo].result, DEMO[demo].query); return; }
      const id = params.get('d');
      let payload = null;
      if (id) { try { payload = JSON.parse(localStorage.getItem('veridex_dash_' + id)); } catch (e) {} }
      if (!payload || !payload.result) { showEmpty(); return; }
      renderDashboard(payload.result, payload.query || '');
    }
    init();
  </script>
</body>
</html>
