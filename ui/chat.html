<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Intelligence Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0f1117; --panel:#161b27; --border:#1e2d45; --accent:#22c55e; --muted:#64748b; --text:#e2e8f0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
    header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    header h1 { font-size: 17px; font-weight: 700; }
    header .sub { font-size: 12px; color: var(--muted); margin-left: auto; }
    #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; max-width: 900px; margin: 0 auto; width: 100%; }
    .msg { display: flex; gap: 10px; }
    .msg .av { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .msg.user { flex-direction: row-reverse; }
    .msg.user .av { background: #1e3a5f; }
    .msg.bot .av { background: #14331f; }
    .bubble { padding: 12px 16px; border-radius: 12px; max-width: 78%; font-size: 14px; line-height: 1.55; overflow-x: auto; }
    .msg.user .bubble { background: #1e3a5f; }
    .msg.bot .bubble { background: var(--panel); border: 1px solid var(--border); }
    .bubble h2 { font-size: 16px; margin: 4px 0 8px; }
    .bubble h3 { font-size: 14px; margin: 12px 0 6px; color: #93c5fd; }
    .bubble table { border-collapse: collapse; margin: 8px 0; font-size: 13px; }
    .bubble th, .bubble td { border: 1px solid var(--border); padding: 5px 10px; text-align: left; }
    .bubble th { background: #0f1117; }
    .bubble code { background: #0f1117; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
    .bubble ul { margin: 6px 0 6px 18px; }
    .bubble em { color: var(--muted); }
    .typing { color: var(--muted); font-size: 13px; }
    .chips { max-width: 900px; margin: 0 auto 8px; padding: 0 24px; display: flex; gap: 8px; flex-wrap: wrap; width: 100%; }
    .chip { background: var(--panel); border: 1px solid var(--border); color: var(--text); font-size: 12px; padding: 6px 12px; border-radius: 16px; cursor: pointer; }
    .chip:hover { border-color: var(--accent); }
    footer { padding: 16px 24px 22px; border-top: 1px solid var(--border); }
    .inputbar { max-width: 900px; margin: 0 auto; display: flex; gap: 10px; }
    #input { flex: 1; background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 12px 16px; font-size: 14px; resize: none; font-family: inherit; }
    #input:focus { outline: none; border-color: var(--accent); }
    #send { background: var(--accent); color: #04130a; border: none; border-radius: 10px; padding: 0 22px; font-weight: 700; cursor: pointer; font-size: 14px; }
    #send:disabled { opacity: .5; cursor: not-allowed; }
    .hint { max-width: 900px; margin: 8px auto 0; font-size: 11px; color: var(--muted); text-align: center; }
  </style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>App Intelligence Agent</h1>
    <span class="sub" id="mode">Release Health · Hypothesis Checker</span>
  </header>

  <div id="messages"></div>

  <footer>
    <div class="inputbar">
      <textarea id="input" rows="1" placeholder="Hỏi về sức khỏe bản cập nhật, hoặc nêu một giả thuyết để kiểm chứng…"></textarea>
      <button id="send" onclick="send()">Gửi</button>
    </div>
  </footer>

  <script>
    marked.setOptions({ gfm: true, breaks: true });
    const sessionId = 'web-' + Math.random().toString(36).slice(2, 10);
    let hcActive = false;          // true while a hypothesis conversation is mid-flow
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function bubble(role, html) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + role;
      wrap.innerHTML = `<div class="av">${role === 'user' ? '🧑' : '🤖'}</div><div class="bubble">${html}</div>`;
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return wrap;
    }

    function fill(text) { inputEl.value = text; inputEl.focus(); }

    async function send() {
      if (sendBtn.disabled) return;       // a send is already in flight
      const text = inputEl.value.trim();
      if (!text) return;
      bubble('user', marked.parseInline(text));
      inputEl.value = '';
      sendBtn.disabled = true;
      const typing = bubble('bot', '<span class="typing">Đang phân tích…</span>');
      const tBubble = typing.querySelector('.bubble');

      // Elapsed-time feedback — cross-platform + LLM can take ~30-60s.
      let secs = 0;
      const timer = setInterval(() => {
        secs += 1;
        tBubble.innerHTML = `<span class="typing">Đang phân tích… ${secs}s</span>`;
      }, 1000);
      // Hard timeout so the UI never spins forever.
      const ctrl = new AbortController();
      const to = setTimeout(() => ctrl.abort(), 180000);

      // Stickiness: while a hypothesis conversation is open, keep routing to it.
      const body = hcActive
        ? { action: 'hypothesis_check', params: { message: text } }
        : { message: text };

      try {
        const resp = await fetch('/invocations', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-GreenNode-AgentBase-Session-Id': sessionId,
            'X-GreenNode-AgentBase-User-Id': 'web-user',
          },
          body: JSON.stringify(body),
          signal: ctrl.signal,
        });
        const data = await resp.json();
        const md = data.markdown || '```json\n' + JSON.stringify(data.result || data, null, 2) + '\n```';
        tBubble.innerHTML = marked.parse(md);

        const r = data.result || {};
        if (r.use_case === 'hypothesis_check') {
          hcActive = (r.status === 'need_context');
        }
      } catch (e) {
        tBubble.innerHTML = e.name === 'AbortError'
          ? '⏱️ Phân tích quá lâu (>180s). Thử lại, hoặc truyền package id (vd <code>com.zing.zalo</code>) để nhanh & chính xác hơn.'
          : '⚠️ Lỗi kết nối agent: ' + e.message;
      } finally {
        clearInterval(timer);
        clearTimeout(to);
        sendBtn.disabled = false;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }

    // Track IME composition (Vietnamese Telex/VNI) — the committing Enter must not send.
    let composing = false;
    inputEl.addEventListener('compositionstart', () => { composing = true; });
    inputEl.addEventListener('compositionend', () => { composing = false; });
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && !composing && !e.isComposing && e.keyCode !== 229) {
        e.preventDefault();
        send();
      }
    });

    bubble('bot', marked.parse(
      '**Xin chào! Tôi là App Intelligence Agent (AI).**\n\n' +
      '- 📊 **Release Health**: "kiểm tra sức khỏe bản cập nhật của <app>"\n' +
      '- 🔬 **Hypothesis Checker**: nêu một giả thuyết, tôi sẽ hỏi lại rồi kiểm chứng bằng dữ liệu\n\n' +
      'Nhập câu hỏi vào ô bên dưới để bắt đầu.'
    ));
  </script>
</body>
</html>
